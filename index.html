<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
<title>KIP Live Overlay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
  font-family: Arial, Helvetica, sans-serif;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 15%, rgba(0, 170, 255, .20), transparent 28%),
    radial-gradient(circle at 85% 32%, rgba(255, 0, 180, .16), transparent 30%),
    linear-gradient(180deg, #02040a 0%, #06101b 48%, #020308 100%);
}

/* oraș noaptea */
.skyline {
  position: absolute;
  left: 0;
  top: 0;
  width: 1080px;
  height: 1920px;
  opacity: .62;
}

.building {
  position: absolute;
  bottom: 0;
  width: 90px;
  background: linear-gradient(180deg, #101827, #04070d);
  box-shadow: inset 0 0 30px rgba(0, 225, 255, .08);
}

.b1 { left: 60px; height: 760px; }
.b2 { left: 170px; height: 920px; width: 120px; }
.b3 { left: 330px; height: 700px; }
.b4 { left: 480px; height: 980px; width: 140px; }
.b5 { left: 690px; height: 820px; width: 110px; }
.b6 { left: 860px; height: 1040px; width: 130px; }

.building::after {
  content: "";
  position: absolute;
  inset: 20px;
  background-image:
    radial-gradient(circle, rgba(0, 220, 255, .65) 1px, transparent 2px),
    radial-gradient(circle, rgba(255, 0, 180, .45) 1px, transparent 2px);
  background-size: 34px 48px, 46px 56px;
  opacity: .38;
  animation: windowsPulse 3s infinite alternate ease-in-out;
}

@keyframes windowsPulse {
  from { opacity: .18; }
  to { opacity: .48; }
}

/* rame pentru camera si sursa */
.frame {
  position: absolute;
  left: 92px;
  width: 896px;
  border: 2px solid rgba(0, 225, 255, .82);
  background: rgba(0, 4, 12, .10);
  box-shadow:
    0 0 18px rgba(0, 225, 255, .70),
    inset 0 0 30px rgba(0, 225, 255, .08);
  z-index: 20;
}

.camera {
  top: 48px;
  height: 565px;
  border-radius: 0 0 26px 26px;
}

.source {
  top: 724px;
  height: 520px;
  border-radius: 18px;
}

/* zona de mijloc, doar delimitare */
.mid {
  position: absolute;
  left: 92px;
  top: 620px;
  width: 896px;
  height: 96px;
  border-radius: 18px;
  border: 1px solid rgba(0, 225, 255, .55);
  background:
    linear-gradient(90deg, rgba(0, 255, 180, .14), rgba(255, 0, 190, .12), rgba(0, 150, 255, .14)),
    rgba(0, 6, 16, .55);
  box-shadow:
    0 0 18px rgba(0, 225, 255, .45),
    inset 0 0 24px rgba(255, 0, 190, .10);
  z-index: 20;
}

/* jos chat fără chenar închis */
.chat-bg {
  position: absolute;
  left: 0;
  top: 1260px;
  width: 1080px;
  height: 660px;
  background:
    radial-gradient(circle at 22% 40%, rgba(0, 255, 190, .18), transparent 30%),
    radial-gradient(circle at 82% 78%, rgba(0, 110, 255, .22), transparent 34%),
    linear-gradient(180deg, rgba(0, 225, 255, .12), rgba(0, 0, 0, .08));
  border-top: 2px solid rgba(0, 225, 255, .65);
  box-shadow: 0 -10px 28px rgba(0, 225, 255, .35);
  z-index: 10;
}

/* spațiu goaluri */
.goals {
  position: absolute;
  right: 92px;
  top: 1268px;
  width: 505px;
  height: 128px;
  border-radius: 14px;
  border: 1px solid rgba(0, 225, 255, .42);
  background: rgba(0, 8, 20, .16);
  box-shadow: 0 0 16px rgba(0, 225, 255, .25);
  z-index: 30;
}

/* nume KIP */
.kip {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  color: #fff;
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 9px;
  text-shadow:
    0 0 8px #00eaff,
    0 0 20px #00eaff,
    0 0 36px #ff00cc;
  animation: kipGlow 2s infinite alternate ease-in-out;
}

@keyframes kipGlow {
  from { opacity: .72; letter-spacing: 7px; }
  to { opacity: 1; letter-spacing: 11px; }
}

/* stradă jos */
.street {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 1080px;
  height: 380px;
  background:
    linear-gradient(180deg, transparent, rgba(0, 0, 0, .75)),
    repeating-linear-gradient(165deg, rgba(255,255,255,.06) 0 2px, transparent 2px 90px);
  z-index: 12;
}

/* mașină civilă dreapta */
.car {
  position: absolute;
  right: 40px;
  bottom: 85px;
  width: 390px;
  height: 120px;
  z-index: 18;
}

.car-body {
  position: absolute;
  bottom: 20px;
  width: 390px;
  height: 80px;
  border-radius: 85px 95px 35px 35px;
  background: linear-gradient(180deg, #151923, #05070b);
  box-shadow: 0 0 30px rgba(0, 170, 255, .22);
}

.car-top {
  position: absolute;
  left: 110px;
  bottom: 82px;
  width: 165px;
  height: 58px;
  border-radius: 80px 80px 0 0;
  background: linear-gradient(180deg, #1b2433, #06080d);
}

.headlight {
  position: absolute;
  right: 0;
  bottom: 46px;
  width: 70px;
  height: 20px;
  border-radius: 20px;
  background: #ff2858;
  box-shadow: 0 0 18px #ff2858;
  animation: hazard 1s infinite ease-in-out;
}

@keyframes hazard {
  0%, 42% { opacity: .25; box-shadow: 0 0 6px #ff2858; }
  50%, 100% { opacity: 1; box-shadow: 0 0 28px #ff2858, 0 0 60px rgba(255,40,88,.55); }
}

/* mașină poliție stânga */
.police {
  position: absolute;
  left: 35px;
  bottom: 78px;
  width: 390px;
  height: 130px;
  z-index: 18;
}

.police-body {
  position: absolute;
  bottom: 20px;
  width: 390px;
  height: 82px;
  border-radius: 80px 95px 34px 34px;
  background: linear-gradient(180deg, #101722, #030509);
  box-shadow: 0 0 36px rgba(0, 130, 255, .28);
}

.police-top {
  position: absolute;
  left: 105px;
  bottom: 82px;
  width: 165px;
  height: 58px;
  border-radius: 75px 75px 0 0;
  background: linear-gradient(180deg, #1b2534, #05070b);
}

.siren {
  position: absolute;
  left: 162px;
  bottom: 137px;
  width: 72px;
  height: 12px;
  border-radius: 20px;
  background: linear-gradient(90deg, #006eff 0 50%, #ff174c 50% 100%);
  box-shadow: 0 0 28px rgba(0, 110, 255, .8), 0 0 28px rgba(255, 23, 76, .8);
  animation: sirenFlash 1.2s infinite alternate ease-in-out;
}

@keyframes sirenFlash {
  from {
    opacity: .35;
    filter: saturate(1);
  }
  to {
    opacity: .95;
    filter: saturate(1.6);
  }
}

.police-light {
  position: absolute;
  left: -90px;
  bottom: -10px;
  width: 620px;
  height: 260px;
  background:
    radial-gradient(circle at 28% 62%, rgba(0, 90, 255, .50), transparent 30%),
    radial-gradient(circle at 72% 62%, rgba(255, 0, 70, .42), transparent 30%);
  filter: blur(22px);
  opacity: .45;
  animation: policeGlow 1.4s infinite alternate ease-in-out;
}

@keyframes policeGlow {
  from { opacity: .25; }
  to { opacity: .60; }
}

/* fum animat */
.smoke {
  position: absolute;
  left: -150px;
  bottom: 140px;
  width: 1400px;
  height: 520px;
  background:
    radial-gradient(circle at 18% 62%, rgba(0, 220, 255, .22), transparent 24%),
    radial-gradient(circle at 48% 50%, rgba(255, 0, 180, .15), transparent 30%),
    radial-gradient(circle at 78% 70%, rgba(0, 255, 190, .14), transparent 28%);
  filter: blur(48px);
  opacity: .62;
  animation: smokeMove 10s infinite alternate ease-in-out;
  z-index: 13;
}

@keyframes smokeMove {
  from { transform: translateX(-70px); }
  to { transform: translateX(85px); }
}

/* lumini neon */
.line {
  position: absolute;
  left: 92px;
  width: 896px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00eaff, #ff00cc, transparent);
  filter: drop-shadow(0 0 8px #00eaff);
  opacity: .80;
  animation: linePulse 3s infinite ease-in-out;
  z-index: 35;
}

.l1 { top: 614px; }
.l2 { top: 716px; }
.l3 { top: 1248px; }

@keyframes linePulse {
  0%, 100% { opacity: .35; }
  50% { opacity: 1; }
}

/* colțuri */
.corner {
  position: absolute;
  width: 62px;
  height: 62px;
  border-color: #00eaff;
  filter: drop-shadow(0 0 8px #00eaff);
  z-index: 36;
}

.c1 { left: 92px; top: 48px; border-left: 3px solid; border-top: 3px solid; }
.c2 { right: 92px; top: 48px; border-right: 3px solid; border-top: 3px solid; border-color: #ff00cc; filter: drop-shadow(0 0 8px #ff00cc); }
.c3 { left: 92px; top: 724px; border-left: 3px solid; border-top: 3px solid; }
.c4 { right: 92px; top: 724px; border-right: 3px solid; border-top: 3px solid; border-color: #ff00cc; filter: drop-shadow(0 0 8px #ff00cc); }

/* scan discret */
.scan {
  position: absolute;
  top: -240px;
  left: 0;
  width: 1080px;
  height: 170px;
  background: linear-gradient(180deg, transparent, rgba(0, 225, 255, .10), transparent);
  animation: scanMove 8s infinite linear;
  z-index: 2;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(2200px); }
}

/* ploaie fină */
.rain {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(180deg, rgba(0, 225, 255, .22), transparent);
  background-size: 2px 46px;
  opacity: .08;
  transform: skewX(-12deg);
  animation: rainMove .7s infinite linear;
  z-index: 3;
}

@keyframes rainMove {
  from { background-position: 0 0; }
  to { background-position: 0 46px; }
}
</style>
</head>

<body>
  <div class="scene">
    <div class="skyline">
      <div class="building b1"></div>
      <div class="building b2"></div>
      <div class="building b3"></div>
      <div class="building b4"></div>
      <div class="building b5"></div>
      <div class="building b6"></div>
    </div>

    <div class="rain"></div>
    <div class="scan"></div>
    <div class="smoke"></div>

    <div class="kip">KIP</div>

    <div class="frame camera"></div>
    <div class="mid"></div>
    <div class="frame source"></div>
    <div class="chat-bg"></div>
    <div class="goals"></div>

    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>

    <div class="corner c1"></div>
    <div class="corner c2"></div>
    <div class="corner c3"></div>
    <div class="corner c4"></div>

    <div class="street"></div>

    <div class="police">
      <div class="police-light"></div>
      <div class="police-body"></div>
      <div class="police-top"></div>
      <div class="siren"></div>
    </div>

    <div class="car">
      <div class="car-body"></div>
      <div class="car-top"></div>
      <div class="headlight"></div>
    </div>
  </div>
</body>
</html>
