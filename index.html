<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KIP Text and Particles Overlay</title>

<style>
:root{
  --scene-width:1080px;
  --scene-height:1920px;

  /* Pozitie texte slide pe canvas 1080x1920 */
  --bar-width:1000px;
  --bar-height:150px;
  --bar-top:547px;
  --slide-font-size:26px;
  --thanks-font-size:26px;

  --blue:#00aaff;
  --cyan:#00eaff;
  --green:#39ff14;
  --red:#ff1744;
  --pink:#ff4fd8;
  --discord:#5865F2;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

#stage{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
}

.scene{
  position:absolute;
  width:var(--scene-width);
  height:var(--scene-height);
  overflow:hidden;
  background:#000;
  transform-origin:top left;
}

























.particle{
  position:absolute;
  bottom:-18px;
  border-radius:50%;
  opacity:0;
  z-index:10;
  animation-name:particleUp;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

@keyframes particleUp{
  0%{transform:translate3d(0,0,0) scale(.45);opacity:0;}
  12%{opacity:.9;}
  100%{transform:translate3d(var(--drift), -680px, 0) scale(1.35);opacity:0;}
}



/* SLIDE TEXT, ACUM IN ACELASI BROWSER SOURCE */
.full-overlay{
  position:absolute;
  left:50%;
  top:var(--bar-top);
  transform:translateX(-50%);
  width:var(--bar-width);
  height:var(--bar-height);
  overflow:visible;
  background:transparent;
  z-index:40;
  pointer-events:none;
}

.mega-bar{
  position:absolute;
  inset:0;
  width:var(--bar-width);
  height:var(--bar-height);
  overflow:visible;
  background:transparent;
}

.row{
  position:absolute;
  left:0;
  width:var(--bar-width);
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}

.row-top{top:4px;}
.row-bottom{top:78px;}



.slide{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:0 18px;
  overflow:visible;
}

.slide.thanks-slide{
  top:0;
  left:0;
  width:var(--bar-width);
  height:var(--bar-height);
  align-items:center;
  justify-content:center;
  flex-wrap:nowrap;
  gap:0;
  padding:0;
}

.main{
  color:#ffffff;
  font-size:var(--thanks-font-size);
  font-weight:1000;
  line-height:1;
  letter-spacing:1px;
  text-shadow:
    0 0 4px #ffffff,
    0 0 10px var(--pink),
    0 0 18px rgba(255,79,216,.75),
    0 0 26px rgba(0,234,255,.45);
}

.slide.entering{
  opacity:0;
  transform:scale(.985);
  animation:slideFadeIn .36s ease-out forwards;
}

.slide.entering .char{
  opacity:1;
  transform:translateY(0) translateX(0) rotateZ(0deg) scale(1);
  filter:blur(0);
}

.slide.active{
  opacity:1;
  transform:scale(1);
}

.slide.active .char{
  opacity:1;
  transform:translateY(0) translateX(0) rotateZ(0deg) scale(1);
  filter:blur(0);
}

.slide.active .message-content{
  animation:heartBeatMessage 1.55s ease-in-out infinite;
  transform-origin:center;
}

.slide.leaving{
  pointer-events:none;
  animation:slideFadeOut .30s ease-in forwards;
}

.slide.leaving .char{
  opacity:1;
  animation:none;
}

.message-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  white-space:nowrap;
  transform-origin:center;
}

.thanks-slide .message-content{
  width:100%;
  justify-content:center;
  gap:0;
}

@keyframes slideFadeIn{
  0%{opacity:0;transform:scale(.985);filter:blur(3px);}
  100%{opacity:1;transform:scale(1);filter:blur(0);}
}

@keyframes slideFadeOut{
  0%{opacity:1;transform:scale(1);filter:blur(0);}
  100%{opacity:0;transform:scale(.985);filter:blur(3px);}
}

@keyframes heartBeatMessage{
  0%, 14%, 28%, 100%{transform:scale(1);filter:brightness(1);}
  7%{transform:scale(1.045);filter:brightness(1.16);}
  21%{transform:scale(1.025);filter:brightness(1.08);}
}

.logo{
  width:58px;
  height:58px;
  object-fit:contain;
  flex-shrink:0;
  z-index:5;
  filter:
    drop-shadow(0 0 10px rgba(0,234,255,.95))
    drop-shadow(0 0 18px rgba(57,255,20,.55));
  animation:logoFloat 2.4s ease-in-out infinite;
}

.icon{
  font-size:36px;
  flex-shrink:0;
  z-index:5;
  filter:drop-shadow(0 0 12px var(--cyan));
  animation:logoFloat 2.4s ease-in-out infinite;
}

@keyframes logoFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-4px) scale(1.06);}
}

.text{
  display:inline-flex;
  white-space:nowrap;
  position:relative;
  z-index:6;
  transform-origin:center;
}

.label{
  color:white;
  font-size:var(--slide-font-size);
  font-weight:1000;
  letter-spacing:.4px;
  text-shadow:
    0 1px 2px rgba(0,0,0,.9),
    0 0 5px rgba(255,255,255,.75),
    0 0 9px rgba(0,234,255,.45);
}

.main{
  color:var(--blue);
  font-size:var(--slide-font-size);
  font-weight:1000;
  line-height:1;
  text-shadow:
    0 2px 3px rgba(0,0,0,.9),
    0 0 6px rgba(0,170,255,.75),
    0 0 13px rgba(0,234,255,.38);
}

.troll-main{
  color:var(--pink);
  font-size:var(--slide-font-size);
  font-weight:1000;
  line-height:1;
  text-shadow:
    0 2px 3px rgba(0,0,0,.9),
    0 0 6px rgba(255,79,216,.78),
    0 0 14px rgba(255,79,216,.42);
}

.small{
  color:white;
  font-size:var(--slide-font-size);
  font-weight:900;
  text-shadow:
    0 1px 2px rgba(0,0,0,.9),
    0 0 5px rgba(255,255,255,.72),
    0 0 9px rgba(0,234,255,.38);
}

.green{
  color:var(--green);
  text-shadow:
    0 2px 3px rgba(0,0,0,.9),
    0 0 6px rgba(57,255,20,.8),
    0 0 13px rgba(57,255,20,.42);
}

.red{
  color:var(--red);
  text-shadow:
    0 2px 3px rgba(0,0,0,.9),
    0 0 6px rgba(255,23,68,.8),
    0 0 13px rgba(255,23,68,.42);
}

.discord{
  color:var(--discord);
  text-shadow:
    0 2px 3px rgba(0,0,0,.9),
    0 0 6px rgba(88,101,242,.8),
    0 0 13px rgba(88,101,242,.42);
}

.char{
  display:inline-block;
  opacity:0;
  transform-origin:center;
  will-change:transform, opacity, filter;
}

.spark{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--pink);
  box-shadow:
    0 0 8px var(--pink),
    0 0 18px rgba(255,79,216,.9);
  opacity:0;
  animation:sparkMove 2.2s ease-in-out infinite;
  animation-delay:var(--spark-delay);
  z-index:2;
}

.row-bottom .spark{
  background:var(--cyan);
  box-shadow:
    0 0 8px var(--cyan),
    0 0 18px rgba(0,234,255,.9);
}

@keyframes sparkMove{
  0%{opacity:0;transform:translateY(8px) scale(.4);}
  35%{opacity:1;transform:translateY(-4px) scale(1.2);}
  100%{opacity:0;transform:translateY(-20px) scale(.5);}
}

.pill{
  position:relative;
  z-index:6;
  padding:4px 10px;
  border-radius:999px;
  background:var(--green);
  color:#061006;
  font-size:var(--slide-font-size);
  font-weight:1000;
  white-space:nowrap;
  box-shadow:
    0 0 12px var(--green),
    0 0 24px rgba(57,255,20,.8);
  animation:pillPulse 1.8s ease-in-out infinite;
}

.danger-pill{
  background:var(--red);
  color:white;
  box-shadow:
    0 0 12px var(--red),
    0 0 26px rgba(255,23,68,.8);
}

@keyframes pillPulse{
  0%,100%{transform:scale(1);filter:brightness(1);}
  50%{transform:scale(1.04);filter:brightness(1.18);}
}

.platforms{
  display:flex;
  gap:7px;
  z-index:6;
}

.platform{
  width:32px;
  height:32px;
  border-radius:10px;
  display:grid;
  place-items:center;
  background:rgba(0,0,0,.25);
  border:2px solid var(--cyan);
  color:white;
  font-size:17px;
  font-weight:1000;
  box-shadow:0 0 12px rgba(0,234,255,.9);
  animation:platformBounce 1.8s ease-in-out infinite;
}

.platform.kick{
  border-color:var(--green);
  color:var(--green);
  box-shadow:0 0 12px rgba(57,255,20,.9);
}

.platform.yt{
  border-color:var(--red);
  color:var(--red);
  box-shadow:0 0 12px rgba(255,23,68,.9);
}

@keyframes platformBounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}

.discord-logo{
  width:40px;
  height:40px;
  display:grid;
  place-items:center;
  border-radius:14px;
  background:rgba(88,101,242,.18);
  box-shadow:
    0 0 14px rgba(88,101,242,1),
    0 0 28px rgba(88,101,242,.75);
  animation:logoFloat 2.4s ease-in-out infinite;
  z-index:6;
}

.discord-logo svg{
  width:32px;
  height:32px;
  filter:drop-shadow(0 0 8px rgba(88,101,242,1));
}
</style>
</head>

<body>
  <div id="stage">
    <div class="scene" id="scene">

      <div class="full-overlay">
        <div class="mega-bar">
          <div class="row row-bottom" id="mainRow"></div>
        </div>
      </div>
    </div>
  </div>

<script>
/* SCALE 1080x1920 PENTRU OBS */
const stage = document.getElementById("stage");
const scene = document.getElementById("scene");

function fitScene(){
  const baseWidth = 1080;
  const baseHeight = 1920;

  const scale = Math.min(
    window.innerWidth / baseWidth,
    window.innerHeight / baseHeight
  );

  const left = (window.innerWidth - baseWidth * scale) / 2;
  const top = (window.innerHeight - baseHeight * scale) / 2;

  scene.style.transform = "translate(" + left + "px, " + top + "px) scale(" + scale + ")";
}

window.addEventListener("resize", fitScene);
window.addEventListener("load", fitScene);
fitScene();

/* PARTICULE BACKGROUND */
const colors = ["#00eaff", "#ff2bd6", "#ffffff", "#18ffb4"];
const particleCount = 46;

function createParticle(){
  const p = document.createElement("div");
  p.className = "particle";

  const size = Math.random() * 4 + 2;
  const left = Math.random() * 1080;
  const duration = Math.random() * 4 + 3.2;
  const delay = Math.random() * 5;
  const drift = (Math.random() * 160 - 80) + "px";
  const color = colors[Math.floor(Math.random() * colors.length)];

  p.style.left = left + "px";
  p.style.width = size + "px";
  p.style.height = size + "px";
  p.style.background = color;
  p.style.boxShadow = "0 0 12px " + color + ", 0 0 24px " + color;
  p.style.animationDuration = duration + "s";
  p.style.animationDelay = delay + "s";
  p.style.setProperty("--drift", drift);

  scene.appendChild(p);
}

for(let i = 0; i < particleCount; i++){
  createParticle();
}

setInterval(() => {
  document.querySelectorAll(".particle").forEach((p) => {
    if(Math.random() > 0.72){
      const left = Math.random() * 1080;
      const drift = (Math.random() * 160 - 80) + "px";
      const color = colors[Math.floor(Math.random() * colors.length)];

      p.style.left = left + "px";
      p.style.background = color;
      p.style.boxShadow = "0 0 12px " + color + ", 0 0 24px " + color;
      p.style.setProperty("--drift", drift);
    }
  });
}, 1800);

/* SLIDE TEXTE */
const slideTime = 4500;
const fadeOutTime = 300;
const fadeInTime = 360;

const trollItems = [];

const promoItems = [
  {icon:"🛒", label:"B-ZONE", main:"SHOP", small:"INTRĂ PE SHOP"},
  {icon:"🏷️", label:"CODUL", main:"KIP", mainClass:"green", small:"PE SHOP PENTRU + 5% BONUS!"},
  {icon:"🌐", label:"LINK SHOP", main:"GTA5.RO/SHOP"},
  {icon:"🎁", label:"ADAUGĂ", main:"REFERRAL 13 LA INCEPUT", mainClass:"green", pill:"MAȘINĂ + GEANTĂ"},
  {icon:"🔴", label:"LIVE PE", main:"TIKTOK", mainClass:"red", small:"KICK & YOUTUBE", platforms:true},
  {discord:true, label:"DISCORD", labelClass:"discord", main:"KIP Community", mainClass:"green", pill:"LINK ÎN BIO"},
  {thanks:true, main:"MULȚUMESC PENTRU APRECIERI!"}
];

let trollIndex = 0;
let promoIndex = 0;

function textSpans(text, className){
  return `<span class="text ${className}">` + [...text].map((char, index) => {
    const center = (text.length - 1) / 2;
    const distance = index - center;
    const flyX = distance * 4;
    const flyR = distance * 2.6;
    const enterX = distance * -2.4;
    const enterR = distance * -1.4;

    return `<span class="char" style="--i:${index}; --fly-x:${flyX}px; --fly-r:${flyR}deg; --enter-x:${enterX}px; --enter-r:${enterR}deg;">${char === " " ? "&nbsp;" : char}</span>`;
  }).join("") + `</span>`;
}

function sparkles(){
  let html = "";
  for(let i = 0; i < 14; i++){
    const left = 70 + Math.random() * 860;
    const top = 8 + Math.random() * 52;
    const delay = Math.random() * 2;
    html += `<span class="spark" style="left:${left}px; top:${top}px; --spark-delay:${delay}s;"></span>`;
  }
  return html;
}

function discordLogo(){
  return `
  <div class="discord-logo">
    <svg viewBox="0 0 245 240" xmlns="http://www.w3.org/2000/svg">
      <path fill="#5865F2" d="M104.4 103.9c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.3-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1zm36.2 0c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.3-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1z"/>
      <path fill="#5865F2" d="M189.5 20h-134C44.2 20 35 29.2 35 40.6v135.2c0 11.4 9.2 20.6 20.5 20.6h113.4l-5.3-18.5 12.8 11.9 12.1 11.2L210 220V40.6c0-11.4-9.2-20.6-20.5-20.6zm-38.6 130.6s-3.6-4.3-6.6-8.1c13.1-3.7 18.1-11.9 18.1-11.9-4.1 2.7-8 4.6-11.5 5.9-5 2.1-9.8 3.5-14.5 4.3-9.6 1.8-18.4 1.3-25.9-.1-5.7-1.1-10.6-2.7-14.7-4.3-2.3-.9-4.8-2-7.3-3.4-.3-.2-.6-.3-.9-.5-.2-.1-.3-.2-.4-.3-1.8-1-2.8-1.7-2.8-1.7s4.8 8 17.5 11.8c-3 3.8-6.7 8.3-6.7 8.3-22.1-.7-30.5-15.2-30.5-15.2 0-32.2 14.4-58.3 14.4-58.3 14.4-10.8 28.1-10.5 28.1-10.5l1 1.2c-18 5.2-26.3 13.1-26.3 13.1s2.2-1.2 5.9-2.9c10.7-4.7 19.2-6 22.7-6.3.6-.1 1.1-.2 1.7-.2 6.1-.8 13-1 20.2-.2 9.5 1.1 19.7 3.9 30.1 9.6 0 0-7.9-7.5-24.9-12.7l1.4-1.6s13.7-.3 28.1 10.5c0 0 14.4 26.1 14.4 58.3 0 0-8.5 14.5-30.6 15.2z"/>
    </svg>
  </div>`;
}

function buildSlide(item, type){
  if(item.thanks){
    let html = `<div class="slide entering">`;
    html += sparkles();
    html += `<div class="message-content">`;
    html += textSpans(item.main, "main");
    html += `</div></div>`;
    return html;
  }

  let html = `<div class="slide entering">`;
  html += sparkles();
  html += `<div class="message-content">`;

  if(item.discord){
    html += discordLogo();
  } else if(item.img){
    html += `<img class="logo" src="${item.img}">`;
  } else if(item.icon){
    html += `<div class="icon">${item.icon}</div>`;
  }

  html += textSpans(item.label, `label ${item.labelClass || ""}`);

  const mainClass = type === "promo" ? `main ${item.mainClass || ""}` : `troll-main ${item.color || ""}`;
  html += textSpans(item.main, mainClass);

  if(item.small){
    html += textSpans(item.small, "small");
  }

  if(item.pill){
    html += `<div class="pill ${item.danger ? "danger-pill" : ""}">${item.pill}</div>`;
  }

  if(item.platforms){
    html += `
    <div class="platforms">
      <div class="platform">♪</div>
      <div class="platform kick">K</div>
      <div class="platform yt">▶</div>
    </div>`;
  }

  html += `</div></div>`;
  return html;
}

function activateSlide(slide){
  setTimeout(() => {
    if(slide){
      slide.classList.remove("entering");
      slide.classList.add("active");
    }
  }, fadeInTime);
}

function switchSlide(rowId, items, index, type){
  if(!Array.isArray(items)) items = [items];

  const row = document.getElementById(rowId);
  const overlay = document.querySelector(".full-overlay");
  const nextItem = items[index];

  if(type === "promo" && nextItem && nextItem.thanks){
    overlay.classList.add("showing-thanks");
  } else {
    overlay.classList.remove("showing-thanks");
  }

  const oldSlide = row.querySelector(".slide");

  const insertNextSlide = () => {
    row.innerHTML = buildSlide(nextItem, type);
    const newSlide = row.querySelector(".slide");
    activateSlide(newSlide);
  };

  if(oldSlide){
    oldSlide.classList.remove("active", "entering");
    oldSlide.classList.add("leaving");

    setTimeout(() => {
      oldSlide.remove();
      insertNextSlide();
    }, fadeOutTime);
  } else {
    insertNextSlide();
  }
}

const mergedItems = promoItems.map(item => ({type:"promo", item:item}));
let mergedIndex=0;
function startSlides(){
 switchSlide("mainRow", mergedItems[0].item,0, mergedItems[0].type);
 setInterval(()=>{
   mergedIndex=(mergedIndex+1)%mergedItems.length;
   const e=mergedItems[mergedIndex];
   switchSlide("mainRow", e.item,0,e.type);
 },slideTime);
}
startSlides();
</script>
</body>
</html>
