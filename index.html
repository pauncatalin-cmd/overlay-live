<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
<title>KIP Vertical Background</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
  font-family: Arial, Helvetica, sans-serif;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 12%, rgba(0, 180, 255, 0.18), transparent 30%),
    radial-gradient(circle at 88% 22%, rgba(255, 0, 170, 0.16), transparent 34%),
    radial-gradient(circle at 25% 88%, rgba(0, 255, 190, 0.16), transparent 32%),
    linear-gradient(180deg, #02040a 0%, #050812 42%, #03050b 100%);
}

/* oraș GTA vibe, făcut doar din CSS */
.city {
  position: absolute;
  inset: 0;
  opacity: 0.42;
  background:
    linear-gradient(to top, rgba(0,0,0,0.95) 0 18%, transparent 18%),
    linear-gradient(to top, #070b12 0 26%, transparent 26%) 60px 0 / 120px 100%,
    linear-gradient(to top, #080d16 0 36%, transparent 36%) 190px 0 / 150px 100%,
    linear-gradient(to top, #060a12 0 48%, transparent 48%) 360px 0 / 110px 100%,
    linear-gradient(to top, #080d18 0 31%, transparent 31%) 520px 0 / 180px 100%,
    linear-gradient(to top, #050912 0 44%, transparent 44%) 760px 0 / 130px 100%;
  filter: blur(0.2px);
}

.city::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(0, 210, 255, 0.55) 1px, transparent 2px),
    radial-gradient(circle, rgba(255, 0, 190, 0.42) 1px, transparent 2px);
  background-size: 72px 64px, 96px 80px;
  background-position: 12px 340px, 44px 460px;
  opacity: 0.35;
  animation: windowPulse 3s infinite alternate ease-in-out;
}

@keyframes windowPulse {
  from { opacity: 0.18; }
  to { opacity: 0.48; }
}

/* fum animat */
.fog {
  position: absolute;
  width: 1400px;
  height: 520px;
  left: -180px;
  bottom: 80px;
  background:
    radial-gradient(circle at 20% 60%, rgba(0, 220, 255, 0.20), transparent 28%),
    radial-gradient(circle at 55% 40%, rgba(255, 0, 180, 0.18), transparent 32%),
    radial-gradient(circle at 80% 65%, rgba(0, 255, 170, 0.13), transparent 30%);
  filter: blur(45px);
  opacity: 0.72;
  animation: fogMove 9s infinite alternate ease-in-out;
}

@keyframes fogMove {
  from { transform: translateX(-60px); }
  to { transform: translateX(80px); }
}

/* lumini poliție */
.police-light {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 1080px;
  height: 520px;
  background:
    radial-gradient(circle at 18% 82%, rgba(0, 80, 255, 0.55), transparent 22%),
    radial-gradient(circle at 82% 82%, rgba(255, 0, 70, 0.50), transparent 24%);
  filter: blur(28px);
  opacity: 0.55;
  animation: policeFlash 1.1s infinite alternate;
}

@keyframes policeFlash {
  0% {
    opacity: 0.25;
    filter: blur(34px) hue-rotate(0deg);
  }
  100% {
    opacity: 0.75;
    filter: blur(26px) hue-rotate(18deg);
  }
}

/* grid discret */
.grid {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.20;
}

/* rame principale */
.frame {
  position: absolute;
  left: 92px;
  width: 896px;
  border: 2px solid rgba(0, 225, 255, 0.78);
  background: rgba(0, 5, 14, 0.14);
  box-shadow:
    0 0 16px rgba(0, 225, 255, 0.65),
    inset 0 0 34px rgba(0, 225, 255, 0.06);
  z-index: 5;
}

.camera-frame {
  top: 48px;
  height: 565px;
  border-radius: 0 0 26px 26px;
}

.source-frame {
  top: 724px;
  height: 520px;
  border-radius: 16px;
}

.chat-zone {
  position: absolute;
  left: 0;
  top: 1265px;
  width: 1080px;
  height: 655px;
  z-index: 4;
  background:
    linear-gradient(180deg, rgba(0, 255, 220, 0.12), rgba(0,0,0,0.02) 32%),
    radial-gradient(circle at 18% 38%, rgba(0, 255, 180, 0.18), transparent 28%),
    radial-gradient(circle at 84% 72%, rgba(0, 120, 255, 0.20), transparent 32%);
  border-top: 2px solid rgba(0, 225, 255, 0.70);
  box-shadow:
    0 -8px 22px rgba(0, 225, 255, 0.45),
    inset 0 30px 50px rgba(0, 225, 255, 0.06);
}

/* delimitare goaluri în dreapta */
.goals-space {
  position: absolute;
  right: 92px;
  top: 1268px;
  width: 505px;
  height: 128px;
  border-radius: 14px;
  border: 1px solid rgba(0, 225, 255, 0.42);
  background: rgba(0, 8, 20, 0.18);
  box-shadow: 0 0 18px rgba(0, 225, 255, 0.28);
  z-index: 7;
}

/* bara dintre cameră și sursă */
.middle-space {
  position: absolute;
  left: 92px;
  top: 620px;
  width: 896px;
  height: 96px;
  border-radius: 17px;
  border: 1px solid rgba(0, 225, 255, 0.55);
  background:
    linear-gradient(90deg, rgba(0, 255, 170, 0.13), rgba(255, 0, 190, 0.11), rgba(0, 190, 255, 0.13)),
    rgba(0, 6, 15, 0.50);
  box-shadow:
    0 0 18px rgba(0, 225, 255, 0.45),
    inset 0 0 22px rgba(255, 0, 190, 0.12);
  z-index: 5;
}

/* numele KIP */
.kip-name {
  position: absolute;
  left: 50%;
  top: 18px;
  transform: translateX(-50%);
  z-index: 9;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 8px;
  color: #ffffff;
  text-shadow:
    0 0 8px #00eaff,
    0 0 18px #00eaff,
    0 0 32px #ff00cc;
  animation: kipGlow 2s infinite alternate ease-in-out;
  pointer-events: none;
}

@keyframes kipGlow {
  from {
    opacity: 0.72;
    letter-spacing: 7px;
  }
  to {
    opacity: 1;
    letter-spacing: 10px;
  }
}

/* contur neon exterior */
.outer-border {
  position: absolute;
  left: 48px;
  top: 0;
  width: 984px;
  height: 1920px;
  border-left: 2px solid rgba(0, 225, 255, 0.32);
  border-right: 2px solid rgba(255, 0, 190, 0.28);
  box-shadow:
    -8px 0 24px rgba(0, 225, 255, 0.18),
    8px 0 24px rgba(255, 0, 190, 0.16);
  z-index: 3;
}

/* scan animat */
.scan {
  position: absolute;
  left: 0;
  top: -260px;
  width: 1080px;
  height: 180px;
  background: linear-gradient(180deg, transparent, rgba(0, 225, 255, 0.12), transparent);
  animation: scanMove 8s infinite linear;
  z-index: 2;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(2200px); }
}

/* linii neon */
.line {
  position: absolute;
  left: 92px;
  width: 896px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00eaff, #ff00cc, transparent);
  filter: drop-shadow(0 0 8px #00eaff);
  opacity: 0.75;
  animation: linePulse 3s infinite ease-in-out;
  z-index: 8;
}

.line.one { top: 614px; }
.line.two { top: 716px; }
.line.three { top: 1248px; }

@keyframes linePulse {
  0%, 100% { opacity: 0.30; }
  50% { opacity: 1; }
}

/* colțuri cyberpunk */
.corner {
  position: absolute;
  width: 64px;
  height: 64px;
  z-index: 8;
  border-color: #00eaff;
  filter: drop-shadow(0 0 8px #00eaff);
}

.c1 {
  left: 92px;
  top: 48px;
  border-left: 3px solid;
  border-top: 3px solid;
}

.c2 {
  right: 92px;
  top: 48px;
  border-right: 3px solid;
  border-top: 3px solid;
  border-color: #ff00cc;
  filter: drop-shadow(0 0 8px #ff00cc);
}

.c3 {
  left: 92px;
  top: 724px;
  border-left: 3px solid;
  border-top: 3px solid;
}

.c4 {
  right: 92px;
  top: 724px;
  border-right: 3px solid;
  border-top: 3px solid;
  border-color: #ff00cc;
  filter: drop-shadow(0 0 8px #ff00cc);
}

/* dungi diagonale jos, fără chenar închis la chat */
.street-lines {
  position: absolute;
  right: -170px;
  bottom: 105px;
  width: 700px;
  height: 260px;
  transform: rotate(-22deg);
  z-index: 4;
  opacity: 0.55;
}

.street-lines span {
  position: absolute;
  display: block;
  width: 700px;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(0, 225, 255, 0.7), transparent);
  box-shadow: 0 0 14px rgba(0, 225, 255, 0.65);
}

.street-lines span:nth-child(1) { top: 40px; }
.street-lines span:nth-child(2) { top: 95px; }
.street-lines span:nth-child(3) { top: 150px; }

/* particule */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #00eaff;
  box-shadow: 0 0 10px #00eaff;
  opacity: 0;
  animation: particleMove 6s infinite linear;
  z-index: 6;
}

.p1 { left: 180px; top: 650px; animation-delay: 0s; }
.p2 { left: 860px; top: 690px; animation-delay: 1s; }
.p3 { left: 300px; top: 1320px; animation-delay: 2s; }
.p4 { left: 760px; top: 1510px; animation-delay: 3s; }
.p5 { left: 520px; top: 1840px; animation-delay: 4s; }

@keyframes particleMove {
  0% {
    transform: translateY(40px);
    opacity: 0;
  }
  25% {
    opacity: 0.8;
  }
  100% {
    transform: translateY(-90px);
    opacity: 0;
  }
}

/* ploaie fină */
.rain {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(180deg, rgba(0, 225, 255, 0.22), transparent);
  background-size: 2px 48px;
  opacity: 0.10;
  transform: skewX(-12deg);
  animation: rainMove 0.7s infinite linear;
  z-index: 1;
}

@keyframes rainMove {
  from { background-position: 0 0; }
  to { background-position: 0 48px; }
}
</style>
</head>

<body>
  <div class="scene">
    <div class="city"></div>
    <div class="fog"></div>
    <div class="police-light"></div>
    <div class="grid"></div>
    <div class="rain"></div>
    <div class="scan"></div>

    <div class="outer-border"></div>

    <div class="kip-name">KIP</div>

    <div class="frame camera-frame"></div>
    <div class="middle-space"></div>
    <div class="frame source-frame"></div>
    <div class="goals-space"></div>
    <div class="chat-zone"></div>

    <div class="line one"></div>
    <div class="line two"></div>
    <div class="line three"></div>

    <div class="corner c1"></div>
    <div class="corner c2"></div>
    <div class="corner c3"></div>
    <div class="corner c4"></div>

    <div class="street-lines">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
  </div>
</body>
</html>
